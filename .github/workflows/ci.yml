name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # go.mod declares `go 1.26`; older toolchains can't run the module.
        go: ["1.26.x"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1 -coverprofile=coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build
        run: go build -o /tmp/openapi-go-mcp ./cmd/openapi-go-mcp

      - name: Sanity check (list operations)
        run: /tmp/openapi-go-mcp -spec testdata/petstore-v3.yaml -list

      - name: Sanity check (Swagger 2.0 conversion)
        run: /tmp/openapi-go-mcp -spec testdata/petstore-v2.json -list

  examples:
    name: Regen + build examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      # Pin oapi-codegen to the version that produced the checked-in generated
      # code. Bump intentionally when refreshing examples; see TODO.md.
      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.0

      - name: Regenerate examples
        run: make regen-examples

      - name: Verify regen produced no diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::make regen-examples produced changes; commit them after regenerating locally."
            exit 1
          fi

      - name: Build all packages
        run: go build ./...

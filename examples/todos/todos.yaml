openapi: "3.0.3"
info:
  version: "1.0.0"
  title: Todos API
  description: |
    A small, self-contained todo-list API used as the canonical
    end-to-end example for openapi-go-mcp.

    The example process embeds an in-memory implementation of this
    API, so running `go run ./examples/todos` boots both the HTTP
    backend and the MCP server in one binary - no external service
    is required.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:8080
paths:
  /todos:
    get:
      summary: List todos
      description: Returns todos, optionally filtered by completion status.
      operationId: listTodos
      parameters:
        - name: completed
          in: query
          description: When set, only return todos with the matching completion state.
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          description: Maximum number of todos to return (1-100).
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Matching todos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create a todo
      operationId: createTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTodo"
      responses:
        "201":
          description: The newly created todo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /todos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Numeric identifier of the todo.
        schema:
          type: integer
          format: int64
    get:
      summary: Get a todo by ID
      operationId: getTodo
      responses:
        "200":
          description: The matching todo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "404":
          description: Todo not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update a todo
      description: Partially update a todo. Omitted fields are left unchanged.
      operationId: updateTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodo"
      responses:
        "200":
          description: The updated todo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "404":
          description: Todo not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete a todo
      operationId: deleteTodo
      responses:
        "204":
          description: Todo deleted.
        "404":
          description: Todo not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Todo:
      type: object
      required: [id, title, completed, createdAt]
      properties:
        id:
          type: integer
          format: int64
          description: Server-assigned identifier.
        title:
          type: string
          description: Human-readable summary of the task.
        completed:
          type: boolean
          description: Whether the task is done.
        createdAt:
          type: string
          format: date-time
          description: When the todo was created (RFC3339).
    NewTodo:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        completed:
          type: boolean
          default: false
    UpdateTodo:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        completed:
          type: boolean
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string

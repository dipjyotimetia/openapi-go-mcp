openapi: 3.0.3
info:
  title: Refs Everywhere
  version: 1.0.0
paths:
  /widgets:
    post:
      operationId: createWidget
      parameters:
        - $ref: '#/components/parameters/RequestIDHeader'
      requestBody:
        $ref: '#/components/requestBodies/WidgetBody'
      responses:
        '201':
          $ref: '#/components/responses/WidgetCreated'
components:
  parameters:
    RequestIDHeader:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
  requestBodies:
    WidgetBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Widget'
  responses:
    WidgetCreated:
      description: created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Widget'
  schemas:
    Widget:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

# GoReleaser config for openapi-go-mcp.
#
# Triggered by .github/workflows/release.yml on tag push (`v*`). Produces:
#   - cross-compiled binaries for darwin/linux/windows × amd64/arm64
#   - .tar.gz / .zip archives, SHA256 checksums, source archive
#   - a GitHub Release attaching every artifact
#   - a Homebrew formula pushed to dipjyotimetia/homebrew-tap
#   - a multi-arch container image published to ghcr.io
#
# Validate locally with: goreleaser release --snapshot --clean --skip=publish
version: 2

project_name: openapi-go-mcp

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: openapi-go-mcp
    main: ./cmd/openapi-go-mcp
    binary: openapi-go-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
      - docs/changelog.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

dockers_v2:
  - images:
      - "ghcr.io/dipjyotimetia/openapi-go-mcp"
    tags:
      - "{{ .Version }}"
      - "latest"
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "OpenAPI → Go MCP code generator"
      org.opencontainers.image.source: "https://github.com/dipjyotimetia/openapi-go-mcp"
      org.opencontainers.image.licenses: "Apache-2.0"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"

homebrew_casks:
  - name: openapi-go-mcp
    repository:
      owner: dipjyotimetia
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/dipjyotimetia/openapi-go-mcp"
    description: "OpenAPI 3.x / Swagger 2.0 → Go MCP code generator"
    binaries:
      - openapi-go-mcp
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

release:
  github:
    owner: dipjyotimetia
    name: openapi-go-mcp
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## openapi-go-mcp {{ .Tag }}

    Install via Homebrew:
    ```
    brew install dipjyotimetia/tap/openapi-go-mcp
    ```

    Or pull the container image:
    ```
    docker pull ghcr.io/dipjyotimetia/openapi-go-mcp:{{ .Version }}
    ```

    Or grab a binary from the assets below.
